<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760" role="img" aria-labelledby="title desc">
  <title id="title">Airy Nara botanical corner spray</title>
  <desc id="desc">A transparent corner arrangement of young maple leaves, soft grass, and subtle peach blossoms in sage, peach, pale blue, and muted gold.</desc>
  <defs>
