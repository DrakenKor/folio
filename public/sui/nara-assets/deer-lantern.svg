<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 360" role="img" aria-labelledby="title desc">
  <title id="title">Nara deer with lantern accents</title>
  <desc id="desc">A delicate line-art young deer with soft Kasuga-taisha lantern hints for an airy Nara pamphlet.</desc>
  <defs>
    <linearGradient id="lineFade" x1="90" y1="56" x2="330" y2="305" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b7a889"/>
      <stop offset="0.48" stop-color="#8f9c78"/>
      <stop offset="1" stop-color="#d39b75"/>
    </linearGradient>
    <linearGradient id="lanternWash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7dfb5"/>
      <stop offset="1" stop-color="#e8b785"/>
    </linearGradient>
    <filter id="softInk" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.35" result="blur"/>
      <feOffset dy="0.35" result="offset"/>
      <feMerge>
        <feMergeNode in="offset"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .line {
        fill: none;
        stroke: url(#lineFade);
        stroke-width: 3.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#softInk);
      }

      .fine {
        fill: none;
        stroke: #b9aa90;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .moss {
        fill: #a9b68c;
      }

      .clay {
        fill: #d9a47d;
      }

      .paper {
        fill: #fff7e9;
      }
    </style>
  </defs>

