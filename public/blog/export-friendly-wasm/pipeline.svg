<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="transmissionGlow" x="-60%" y="-240%" width="220%" height="580%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="#050505"/>
  <rect x="60" y="180" width="280" height="120" rx="18" fill="#111111" stroke="#5B5B5B"/>
  <rect x="460" y="180" width="280" height="120" rx="18" fill="#111111" stroke="#8A8A8A"/>
  <rect x="860" y="180" width="280" height="120" rx="18" fill="#111111" stroke="#BDBDBD"/>
  <path d="M340 240H460" stroke="#7F7F7F" stroke-width="5" stroke-linecap="round"/>
  <path d="M740 240H860" stroke="#A3A3A3" stroke-width="5" stroke-linecap="round"/>
  <g filter="url(#transmissionGlow)">
    <circle cx="340" cy="240" r="9" fill="#F5F5F5" opacity="0">
      <animate attributeName="cx" values="340;460" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.88;1" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="7;10;8" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="240" r="5" fill="#D4D4D4" opacity="0">
      <animate attributeName="cx" values="340;460" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.12;0.88;1" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;6;5" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="240" r="9" fill="#F5F5F5" opacity="0">
      <animate attributeName="cx" values="740;860" dur="2.4s" begin="0.72s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.88;1" dur="2.4s" begin="0.72s" repeatCount="indefinite"/>
      <animate attributeName="r" values="7;10;8" dur="2.4s" begin="0.72s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="240" r="5" fill="#D4D4D4" opacity="0">
      <animate attributeName="cx" values="740;860" dur="2.4s" begin="1.92s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.12;0.88;1" dur="2.4s" begin="1.92s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;6;5" dur="2.4s" begin="1.92s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="200" y="228" fill="#F5F5F5" font-family="monospace" font-size="30" text-anchor="middle">MDX Sources</text>
  <text x="200" y="268" fill="#9F9F9F" font-family="monospace" font-size="20" text-anchor="middle">src/content/blog</text>
  <text x="600" y="228" fill="#F5F5F5" font-family="monospace" font-size="30" text-anchor="middle">Static Build</text>
  <text x="600" y="268" fill="#9F9F9F" font-family="monospace" font-size="20" text-anchor="middle">frontmatter + routes</text>
  <text x="1000" y="228" fill="#F5F5F5" font-family="monospace" font-size="30" text-anchor="middle">Exported Site</text>
  <text x="1000" y="268" fill="#9F9F9F" font-family="monospace" font-size="20" text-anchor="middle">GitHub Pages</text>
  <text x="600" y="560" fill="#D4D4D4" font-family="monospace" font-size="30" text-anchor="middle">Deterministic routes + public assets + UTC dates</text>
</svg>
